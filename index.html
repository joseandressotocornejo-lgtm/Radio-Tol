<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Radio Hub</title>
    <link rel="manifest" href="manifest.json">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#00ffff">
</head>
<body>

<div id="app">
    <button id="config-toggle" aria-label="Configuración">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
    </button>

    <div id="radio-card">
        <div id="logo-container">
            <img id="station-logo" src="img/RadioOff.png" alt="Station Logo" class="is-radio-off">
        </div>
        <div id="station-name">RADIO OFF</div>
    </div>

    <div id="radio-instructions">
        <span>↔ cambiar</span>
        <span>↑ entrar</span>
        <span>↓ salir / apagar</span>
    </div>
</div>

<div id="config-panel" class="hidden">
    <div id="config-content">
        <h2>CONFIGURACIÓN</h2>
        <hr>
        
        <div class="config-group">
            <label for="volume-control">Volumen</label>
            <input type="range" id="volume-control" min="0" max="1" step="0.05" value="1">
        </div>

        <div class="config-group">
            <label for="color-control">Color Neón</label>
            <select id="color-control">
                <option value="cyan" selected>Cian</option>
                <option value="magenta">Magenta</option>
                <option value="green">Verde</option>
                <option value="yellow">Amarillo</option>
                <option value="red">Rojo</option>
            </select>
        </div>

        <div class="config-group checkbox-group">
            <label>
                <input type="checkbox" id="rhythm-control"> Ritmo del neón multicolor
            </label>
        </div>

        <div class="config-group checkbox-group">
            <label>
                <input type="checkbox" id="rotation-control"> Rotar carátula
            </label>
        </div>

        <hr>
        <div id="credits-section">
            <h3>CRÉDITOS</h3>
            <p><strong>Desarrollador:</strong> ING Jose </p>
            <p><strong>Plataforma de Código:</strong> GitHub</p>
            <p><strong>IA de Soporte (Armador):</strong> Google Gemini</p>
            <p><strong>Servicios Involucrados:</strong> Dropbox, SoundJay, Google Fonts</p>
        </div>
    </div>
</div>

<audio id="radio-audio" loop></audio>
<audio id="static-sfx" src="https://www.soundjay.com/tv-and-radio/static-radio-01.mp3"></audio>
<audio id="menu-sfx" src="img/gta-sa-menu.mp3"></audio>

<script src="radio.js"></script>
</body>
</html>
