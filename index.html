<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Radio Hub</title>
    <link rel="manifest" href="manifest.json">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#00ffff">
</head>
<body>

<div id="app">

    <div id="radio-card">
        <div id="logo-container">
            <img id="station-logo" src="img/RadioOff.png" alt="Station Logo">
        </div>
        <div id="station-name">RADIO OFF</div>
    </div>

    <div id="radio-instructions">
        <span>🡘 cambiar</span>
        <span>🡙 entrar</span>
        <span>🡛 salir / apagar</span>
    </div>

</div>

<audio id="radio-audio" loop></audio>
<audio id="static-sfx" src="https://www.soundjay.com/tv-and-radio/static-radio-01.mp3"></audio>
<audio id="menu-sfx" src="img/gta-sa-menu.mp3"></audio>

<script src="radio.js"></script>
</body>
</html>
